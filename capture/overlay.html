<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      user-select: none;
      background: #000;
    }

    #overlay-canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    /* 顶部提示条 */
    #hint-bar {
      position: fixed;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      padding: 7px 18px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      transition: opacity 0.2s;
    }

    /* 尺寸跟随标签 */
    #size-label {
      position: fixed;
      background: rgba(0,212,255,0.85);
      color: #0a0a14;
      font-family: monospace;
      font-size: 12px; font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    /* 确认按钮（选区右下角弹出） */
    #confirm-btn {
      position: fixed;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: #00d4ff;
      color: #0a0a14;
      font-family: -apple-system, sans-serif;
      font-size: 13px; font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    #confirm-btn:hover { background: #00b8d9; }
  </style>
</head>
<body>
  <div id="hint-bar">拖拽选择截图区域 · ESC 取消</div>
  <div id="size-label"></div>
  <button id="confirm-btn">✓ 确认截图</button>
  <canvas id="overlay-canvas"></canvas>
  <script src="overlay.js"></script>
</body>
</html>
