<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── 全屏无滚动，光标十字 ───────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      background: #000; /* 加载前短暂黑屏 */
    }

    /* canvas 铺满全屏 */
    #overlay-canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* 顶部提示条 */
    #hint-bar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 8px 20px;
      border-radius: 22px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    /* 尺寸提示（跟随鼠标）*/
    #size-label {
      position: fixed;
      background: rgba(0, 212, 255, 0.85);
      color: #0a0a14;
      font-family: monospace;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>
  <div id="hint-bar">拖拽选择截图区域 &nbsp;·&nbsp; <kbd>ESC</kbd> 取消</div>
  <div id="size-label" id="size-label"></div>
  <canvas id="overlay-canvas"></canvas>

  <script src="overlay.js"></script>
</body>
</html>
