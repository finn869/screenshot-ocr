<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>截图 OCR 工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── 顶部工具栏（所有操作按钮集中在这里）────────────── -->
    <header id="toolbar">

      <!-- 左：品牌名 -->
      <div id="brand">
        <span id="logo">📸</span>
        <h1>截图 OCR</h1>
      </div>

      <!-- 快捷键显示 + 编辑（点击进入录制模式）-->
      <div id="shortcut-wrap" title="点击修改快捷键">
        <span id="shortcut-label">快捷键</span>
        <span id="shortcut-key">F1</span>
        <span id="shortcut-edit-hint">点击修改</span>
      </div>

      <!-- 中：主要操作按钮组 -->
      <div id="btn-group">
        <!-- 区域截图：拖拽选区 -->
        <button id="btn-capture" class="btn-primary">
          <span class="btn-icon">⬚</span> 截图
        </button>

        <!-- 全屏截图（主显示器）-->
        <button id="btn-fullscreen" class="btn-secondary">
          <span class="btn-icon">🖥</span> 全屏
        </button>

        <!-- 从本机开启图片档案 -->
        <button id="btn-open-file" class="btn-secondary">
          <span class="btn-icon">📂</span> 开启图片
        </button>
        <!-- 隐藏的 file input，由按钮触发 -->
        <input id="file-input" type="file" accept="image/*" style="display:none">

        <div class="divider"></div>

        <!-- 截图后才能用的操作 -->
        <button id="btn-clear-rect" class="btn-ghost" disabled>
          <span class="btn-icon">⬜</span> 清除标注
        </button>
      </div>

      <!-- 右：状态提示 -->
      <div id="status-area">
        <span id="ocr-status"></span>
      </div>

    </header>

    <!-- ── 主内容区：左（图片）+ 右（OCR 结果）──────────── -->
    <main id="content">

      <!-- 左侧：截图 canvas -->
      <section id="image-panel">

        <!-- 工具面板：工具选择 + 颜色 + 笔刷大小 -->
        <div id="tool-palette">

          <!-- 工具按钮 -->
          <div class="palette-group">
            <button class="tool-btn active" data-tool="rect"      title="矩形">▭</button>
            <button class="tool-btn"        data-tool="ellipse"   title="橢圓">◯</button>
            <button class="tool-btn"        data-tool="line"      title="直線">╱</button>
            <button class="tool-btn"        data-tool="pen"       title="画笔">✏️</button>
            <button class="tool-btn"        data-tool="highlight" title="荧光笔">🖊</button>
            <button class="tool-btn"        data-tool="arrow"     title="箭頭">➜</button>
            <button class="tool-btn"        data-tool="text"      title="文字">T</button>
            <button class="tool-btn"        data-tool="mosaic"    title="马赛克">⊞</button>
          </div>

          <div class="palette-sep"></div>

          <!-- 撤销 / 重做 -->
          <div class="palette-group">
            <button id="btn-undo" class="tool-btn" disabled title="撤销上一步标注 (⌘Z)">⟲</button>
            <button id="btn-redo" class="tool-btn" disabled title="取消撤销 (⌘⇧Z)">⟳</button>
          </div>

          <div class="palette-sep"></div>

          <!-- 颜色色块 -->
          <div class="palette-group">
            <button class="color-btn active" data-color="#ff4757" style="background:#ff4757" title="红"></button>
            <button class="color-btn"        data-color="#ffa502" style="background:#ffa502" title="橙"></button>
            <button class="color-btn"        data-color="#ffff00" style="background:#ffff00" title="黄"></button>
            <button class="color-btn"        data-color="#2ed573" style="background:#2ed573" title="绿"></button>
            <button class="color-btn"        data-color="#1e90ff" style="background:#1e90ff" title="蓝"></button>
            <button class="color-btn"        data-color="#ffffff" style="background:#ffffff" title="白"></button>
            <!-- 自訂顏色拾色器 -->
            <label class="color-btn color-picker-label" id="color-picker-label" title="自訂顏色">
              ＋
              <input type="color" id="color-picker" value="#ff4757">
            </label>
          </div>

          <div class="palette-sep"></div>

          <!-- 笔刷大小 -->
          <div class="palette-group">
            <button class="size-btn"        data-size="2"  title="细">─</button>
            <button class="size-btn active" data-size="4"  title="中">━</button>
            <button class="size-btn"        data-size="8"  title="粗">▬</button>
          </div>

        </div>

        <div id="canvas-wrap">
          <div id="empty-state">
            <div id="empty-icon">⬚</div>
            <p>点击「截图」开始</p>
            <small>框选区域后可在图上拖拽画矩形</small>
          </div>
          <canvas id="main-canvas"></canvas>
        </div>
      </section>

      <!-- 右侧：OCR + 翻译面板 -->
      <section id="ocr-panel">

        <!-- OCR 结果区 -->
        <div class="panel-section" id="ocr-section">
          <div class="panel-section-title">
            <button id="btn-ocr" class="btn-panel-translate" disabled title="点击执行 OCR 识别">🔍 OCR 识别</button>
            <div class="panel-title-actions">
              <button id="btn-privacy-mask" class="btn-panel-action btn-privacy" disabled title="自動偵測並遮蔽敏感資料（IP、Email、電話、身分證、信用卡、API Key…）">🛡️ 隱私遮蔽</button>
              <button id="btn-copy" class="btn-panel-action" disabled title="复制识别文字">📋 複製</button>
            </div>
          </div>
          <!-- 遮蔽摘要列（初始隱藏）-->
          <div id="privacy-summary" style="display:none"></div>
          <div id="ocr-result">
            <p class="placeholder-text">OCR 結果將顯示在這裡…</p>
          </div>
        </div>

        <!-- 翻译结果区 -->
        <div class="panel-section" id="translate-section">
          <div class="panel-section-title">
            <button id="btn-translate" class="btn-panel-translate" disabled title="点击执行翻译">🌐 翻译</button>
            <div class="panel-title-actions">
              <select id="lang-select" title="选择目标语言">
                <option value="zh|en">中文 → 英文</option>
                <option value="en|zh">英文 → 中文</option>
                <option value="zh|ja">中文 → 日文</option>
                <option value="ja|zh">日文 → 中文</option>
                <option value="ko|zh">韩文 → 中文</option>
                <option value="zh|fr">中文 → 法文</option>
              </select>
              <button id="btn-copy-translation" class="btn-panel-action" disabled title="复制翻译文字">📋 复制</button>
            </div>
          </div>
          <div id="translation-result">
            <p class="placeholder-text">翻译结果将显示在这里…</p>
          </div>
        </div>

      </section>

    </main>
  </div>

  <script src="privacy-mask.js"></script>
  <script src="index.js"></script>
</body>
</html>
